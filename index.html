<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alternate Life MVP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <h1>Alternate Life</h1>
      <button id="resetBtn" onclick="resetLife()">New Life</button>
    </header>

    <div id="chat"></div>

    <div id="loading" class="hidden">AI is shaping your destiny...</div>

    <div class="input-area">
      <input id="userInput" placeholder="What do you do?" onkeydown="if(event.key==='Enter') sendMessage()" />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
