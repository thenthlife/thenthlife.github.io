<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>The nᵗʰ Life // PORTAL</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <meta name="theme-color" content="#10b981">
</head>
<body class="portal-page">

  <div id="boot-sequence" class="boot-overlay">
    <div id="boot-log"></div>
  </div>

  <div class="scanlines"></div>

  <div class="app-portal">
    <div class="portal-container">

      <header class="portal-header">
        <h1>THE n<sup>th</sup> LIFE</h1>
        <p class="status-text">SYSTEM_READY // SELECT_TIMELINE</p>
      </header>

      <nav class="mode-select">

        <!-- 01: FREE ROAM -->
        <a href="free-roam.html" class="mode-btn">
          <div class="btn-number">01</div>
          <div class="btn-content">
            <span class="btn-title">FREE ROAM</span>
            <span class="btn-desc">Unrestricted Reality Simulation</span>
          </div>
        </a>

        <!-- 02: SURVIVAL + sub-menu -->
        <div class="survival-group">
          <a href="2nd-life.html" class="mode-btn">
            <div class="btn-number">02</div>
            <div class="btn-content">
              <span class="btn-title">2ND LIFE // SURVIVAL</span>
              <span class="btn-desc">Hardcore Tactical Logic — Permadeath</span>
            </div>
          </a>
          <div class="sub-menu">
            <a href="notable-lives.html" class="sub-btn">
              <span class="sub-btn-icon">◈</span>
              <span>NOTABLE_LIVES</span>
              <span class="sub-btn-label">Personal Archives</span>
            </a>
            <a href="#" class="sub-btn placeholder" onclick="return false;" title="Available in Phase 2">
              <span class="sub-btn-icon">⬡</span>
              <span>LEADERBOARDS</span>
              <span class="sub-btn-label placeholder-tag">PHASE_2</span>
            </a>
          </div>
        </div>

        <!-- 03: MULTIPLAYER (placeholder) -->
        <div class="mode-btn placeholder" onclick="return false;" title="Available in Phase 3">
          <div class="btn-number">03</div>
          <div class="btn-content">
            <span class="btn-title">MULTIPLAYER</span>
            <span class="btn-desc">Ad-Hoc Session Play — Competitive &amp; Co-op</span>
            <span class="placeholder-tag">PHASE_3</span>
          </div>
        </div>

      </nav>

      <footer class="portal-footer">
        <a href="https://github.com/thenthlife/thenthlife.github.io/blob/main/README.md"
           target="_blank" class="manual-link">
          [!] ACCESS_SYSTEM_MANUAL
        </a>
      </footer>

    </div>
  </div>

  <script>
    const bootLogs = [
      "INITIALIZING_QUANTUM_CORE...",
      "VERIFYING_NEURAL_LINK...",
      "LOADING_GEMINI_2.5_FLASH_DRIVERS...",
      "DECRYPTING_TIMELINE_MATRICES...",
      "SCANNING_LOCAL_STORAGE...",
      "ESTABLISHING_CONNECTION_TO_2026_REALITY...",
      "SYSTEM_READY."
    ];

    async function startBoot() {
      const logContainer = document.getElementById('boot-log');
      if (sessionStorage.getItem('booted')) {
        document.getElementById('boot-sequence').style.display = 'none';
        return;
      }
      for (const log of bootLogs) {
        const line = document.createElement('div');
        line.innerText = `[OK] ${log}`;
        logContainer.appendChild(line);
        await new Promise(r => setTimeout(r, 350));
      }
      setTimeout(() => {
        document.getElementById('boot-sequence').classList.add('fade-out');
        sessionStorage.setItem('booted', 'true');
      }, 800);
    }

    window.onload = () => startBoot();
  </script>

</body>
</html>
